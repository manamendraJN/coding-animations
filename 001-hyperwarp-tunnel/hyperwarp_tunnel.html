
<canvas id="c" style="display:block;width:100%;border-radius:12px;background:#000;cursor:crosshair"></canvas>
<script>
const cv = document.getElementById('c');
const gl = cv.getContext('webgl');
let W,H,prog,t0=Date.now(),mx=0.5,my=0.5,mxS=0.5,myS=0.5;

const VS=`attribute vec2 p;void main(){gl_Position=vec4(p,0,1);}`;
const FS=`
precision highp float;
uniform float time;
uniform vec2 res,mouse;
#define PI 3.14159265
#define TAU 6.28318530

float hash(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);}
float noise(vec2 p){
  vec2 i=floor(p),f=fract(p);
  f=f*f*(3.-2.*f);
  return mix(mix(hash(i),hash(i+vec2(1,0)),f.x),
             mix(hash(i+vec2(0,1)),hash(i+vec2(1,1)),f.x),f.y);
}
float fbm(vec2 p){
  float v=0.,a=.5;
  for(int i=0;i<7;i++){v+=a*noise(p);p=p*2.13+vec2(1.7,9.2);a*=.5;}
  return v;
}

vec3 palette(float t){
  vec3 a=vec3(.5,.5,.5);
  vec3 b=vec3(.5,.5,.5);
  vec3 c=vec3(1.,1.,1.);
  vec3 d=vec3(.00,.33,.67);
  return a+b*cos(TAU*(c*t+d));
}

void main(){
  vec2 uv=(gl_FragCoord.xy-.5*res)/min(res.x,res.y);
  vec2 mp=(mouse-.5)*vec2(res.x/res.y,1.)*.6;
  float t=time*.55;

  /* Pull UV toward mouse — makes tunnel steer */
  uv-=mp*(1.-length(uv)*.8);

  float r=length(uv);
  float a=atan(uv.y,uv.x);

  /* Tunnel depth — z flies forward */
  float z=1./(r+.07);
  float depth=fract(z-t*1.4);

  /* Twist angle grows with depth */
  float twist=a+z*.9+t*.7;

  /* Polar warp coords fed into fBm */
  vec2 warpUV=vec2(twist/TAU+.5, depth);
  float w1=fbm(warpUV*3.+t*.3);
  float w2=fbm(warpUV*2.-t*.2+vec2(w1));
  vec2 warped=warpUV+vec2(w1,w2)*.35;

  float f=fbm(warped*4.+t*.15);

  /* Colored rings pulsing down the tunnel */
  float rings=sin(depth*30.-t*4.)*sin(depth*13.+t*2.);
  float glow=exp(-r*3.)*1.8;

  /* Streaks along tunnel walls */
  float streak=pow(abs(sin(twist*8.+fbm(vec2(twist,z*.5+t))*4.)),12.);

  /* Color from palette driven by warp depth + time */
  vec3 col=palette(f*.7+t*.12);
  col=mix(col,palette(f+rings*.3+t*.08),abs(rings)*.6);
  col*=0.15+0.85*(1.-exp(-depth*8.))*exp(-depth*1.5); /* depth fade */
  col+=vec3(.6,.3,1.)*streak*.9;
  col+=vec3(.2,.6,1.)*glow*(.5+.5*sin(t*2.+z));

  /* Vignette */
  col*=1.-smoothstep(.55,.95,r);

  /* Bloom center */
  col+=palette(t*.2)*exp(-r*6.)*1.2;

  col=pow(max(col,vec3(0.)),vec3(.82));
  gl_FragColor=vec4(col,1.);
}`;

function sh(src,type){const s=gl.createShader(type);gl.shaderSource(s,src);gl.compileShader(s);return s;}
function build(){
  prog=gl.createProgram();
  gl.attachShader(prog,sh(VS,gl.VERTEX_SHADER));
  gl.attachShader(prog,sh(FS,gl.FRAGMENT_SHADER));
  gl.linkProgram(prog);gl.useProgram(prog);
  const b=gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER,b);
  gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);
  const l=gl.getAttribLocation(prog,'p');
  gl.enableVertexAttribArray(l);gl.vertexAttribPointer(l,2,gl.FLOAT,false,0,0);
}
function resize(){
  const r=cv.parentElement.getBoundingClientRect();
  W=cv.width=Math.round(r.width);
  H=cv.height=Math.min(Math.round(r.width*.5625),420);
  cv.style.height=H+'px';
  gl.viewport(0,0,W,H);
}
function loop(){
  const t=(Date.now()-t0)/1000;
  mxS+=(mx-mxS)*.04;myS+=(my-myS)*.04;
  gl.uniform1f(gl.getUniformLocation(prog,'time'),t);
  gl.uniform2f(gl.getUniformLocation(prog,'res'),W,H);
  gl.uniform2f(gl.getUniformLocation(prog,'mouse'),mxS,myS);
  gl.drawArrays(gl.TRIANGLE_STRIP,0,4);
  requestAnimationFrame(loop);
}
cv.addEventListener('mousemove',e=>{
  const r=cv.getBoundingClientRect();
  mx=(e.clientX-r.left)/r.width;
  my=1-(e.clientY-r.top)/r.height;
});
window.addEventListener('resize',resize);
build();resize();loop();
</script>
